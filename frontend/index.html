<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Indian Overseas Bank — Internet Banking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <!-- MediaPipe assets are served from /mediapipe/ (copied from node_modules) -->
    <!-- JS modules imported directly in Enroll.jsx and VidLive.jsx via npm -->
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --iob-blue-dark:  #003F7D;
        --iob-blue:       #0057A8;
        --iob-blue-mid:   #1976D2;
        --iob-blue-light: #E6F1FB;
        --iob-gold:       #FFB300;
        --iob-white:      #FFFFFF;
        --iob-bg:         #F0F4F9;
        --iob-text:       #1A2B4A;
        --iob-muted:      #5A7399;
        --iob-success:    #1B6B3A;
        --iob-danger:     #B71C1C;
        --iob-border:     #C5D8F0;
      }

      html, body, #root {
        height: 100%;
        font-family: 'Noto Sans', sans-serif;
        background-color: var(--iob-bg);
        color: var(--iob-text);
      }

      a {
        color: var(--iob-blue);
        text-decoration: none;
      }

      a:hover {
        color: var(--iob-blue-mid);
        text-decoration: underline;
      }

      button {
        cursor: pointer;
        font-family: 'Noto Sans', sans-serif;
      }

      input, select, textarea {
        font-family: 'Noto Sans', sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
